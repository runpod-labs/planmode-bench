id: "refactoring/extract-service-layer"
name: "extract service layer from route handlers"
version: 1

category: "refactoring"
difficulty: "hard"
estimated_time_minutes: 20
tags: ["typescript", "express", "refactoring", "architecture", "multi-file"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  The route handlers have business logic mixed directly into them. Refactor the
  code to extract business logic into a proper service layer so route handlers
  only deal with HTTP concerns (request parsing, response sending). All existing
  tests must continue to pass.

setup:
  install_command: "npm install"
  timeout_minutes: 15
  max_budget_usd: 25.00

evaluation:
  - type: "test-suite"
    command: "npx vitest run"
    weight: 0.3

  - type: "test-integrity"
    weight: 0.1

  - type: "file-check"
    checks:
      - path: "src/services/product-service.ts"
        must_exist: true
      - path: "src/services/order-service.ts"
        must_exist: true
      - path: "src/routes/products.ts"
        must_exist: true
      - path: "src/routes/orders.ts"
        must_exist: true
    weight: 0.2

  - type: "build"
    command: "npx tsc --noEmit"
    weight: 0.2

  - type: "regex"
    file: "src/routes/products.ts"
    patterns:
      - pattern: "import.*services.*product"
        should_match: true
    weight: 0.1

  - type: "regex"
    file: "src/routes/orders.ts"
    patterns:
      - pattern: "import.*services.*order"
        should_match: true
    weight: 0.1
