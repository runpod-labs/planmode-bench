id: "algorithm/implement-event-emitter"
name: "implement full-featured event emitter"
version: 1

category: "algorithm"
difficulty: "medium"
estimated_time_minutes: 15
tags: ["typescript", "data-structures", "event-emitter", "design-patterns"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  Implement the EventEmitter class so that all tests pass. It should support
  subscribing, unsubscribing, one-time listeners, emitting events, and querying
  listener metadata. Make sure edge cases like removing a listener mid-emit are
  handled gracefully.

setup:
  install_command: "npm install"
  timeout_minutes: 10
  max_budget_usd: 40.00

evaluation:
  - type: "test-suite"
    command: "npx vitest run"
    weight: 0.5

  - type: "test-integrity"
    weight: 0.1

  - type: "build"
    command: "npx tsc --noEmit"
    weight: 0.2

  - type: "file-check"
    checks:
      - path: "src/event-emitter.ts"
        must_exist: true
        must_contain:
          - "on("
          - "emit("
          - "once("
    weight: 0.2
