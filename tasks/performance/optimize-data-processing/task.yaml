id: "performance/optimize-data-processing"
name: "optimize slow data processing pipeline"
version: 1

category: "performance"
difficulty: "hard"
estimated_time_minutes: 20
tags: ["typescript", "performance", "optimization", "algorithms", "data-structures"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  The data processing pipeline is too slow. Optimize it to meet the performance
  thresholds defined in the test suite while keeping all correctness tests
  passing. The functions must produce identical results -- only the performance
  should improve.

setup:
  install_command: "npm install"
  timeout_minutes: 15
  max_budget_usd: 25.00

evaluation:
  - type: "test-suite"
    command: "npx vitest run"
    weight: 0.5

  - type: "test-integrity"
    weight: 0.1

  - type: "build"
    command: "npx tsc --noEmit"
    weight: 0.2

  - type: "file-check"
    checks:
      - path: "src/pipeline.ts"
        must_exist: true
        must_contain:
          - "Map"
    weight: 0.2
