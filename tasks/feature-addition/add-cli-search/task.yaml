id: "feature-addition/add-cli-search"
name: "Add Search Functionality to Python CLI"
version: 1

category: "feature-addition"
difficulty: "medium"
estimated_time_minutes: 15
tags: ["python", "cli", "search", "argparse"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  This Python CLI tool manages bookmarks but has no search functionality. Add it:

  1. Create `src/search.py` with search functions:
     - search_by_title(bookmarks, query) - case-insensitive substring match
     - search_by_tag(bookmarks, tag) - exact tag match
     - search_by_domain(bookmarks, domain) - match URL domain
     - search(bookmarks, title=None, tag=None, domain=None) - combine criteria with AND logic
  2. Add a `search` command to the CLI in `src/cli.py`:
     - `--title` flag for title search
     - `--tag` flag for tag search
     - `--domain` flag for domain search
     - `--format` flag: "table" (default) or "json"
  3. All existing tests should still pass
  4. All tests in tests/test_search.py should pass

setup:
  install_command: "pip3 install -e '.[test]'"
  timeout_minutes: 10
  max_budget_usd: 25.00

evaluation:
  - type: "test-suite"
    command: "python3 -m pytest tests/ -v"
    weight: 0.5

  - type: "test-integrity"
    weight: 0.1

  - type: "file-check"
    checks:
      - path: "src/search.py"
        must_exist: true
        must_contain:
          - "search_by_title"
          - "search_by_tag"
          - "search_by_domain"
    weight: 0.2

  - type: "build"
    command: "python3 -m py_compile src/search.py"
    weight: 0.2
