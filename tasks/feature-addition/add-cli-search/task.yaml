id: "feature-addition/add-cli-search"
name: "add search functionality to CLI"
version: 1

category: "feature-addition"
difficulty: "medium"
estimated_time_minutes: 15
tags: ["python", "cli", "search", "argparse"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  This Python CLI tool manages bookmarks but has no search functionality. Add a
  `search` command that lets users filter bookmarks by title (substring match),
  tag (exact match), and domain, with AND logic when multiple criteria are
  provided. Support both table and JSON output formats. All tests should pass.

setup:
  install_command: "pip3 install -e '.[test]'"
  timeout_minutes: 10
  max_budget_usd: 40.00

evaluation:
  - type: "test-suite"
    command: "python3 -m pytest tests/ -v"
    weight: 0.5

  - type: "test-integrity"
    weight: 0.1

  - type: "file-check"
    checks:
      - path: "src/search.py"
        must_exist: true
        must_contain:
          - "search_by_title"
          - "search_by_tag"
          - "search_by_domain"
    weight: 0.2

  - type: "build"
    command: "python3 -m py_compile src/search.py"
    weight: 0.2
