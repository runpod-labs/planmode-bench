id: "feature-addition/add-shadcn-stepper"
name: "add stepper component"
version: 1

category: "feature-addition"
difficulty: "hard"
estimated_time_minutes: 25
tags: ["typescript", "react", "tailwindcss", "shadcn", "component", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new "Stepper" compound component to the shadcn/ui component library for
  multi-step wizards and onboarding flows. It should include sub-components for
  the container, individual step items, clickable triggers, titles, descriptions,
  separators between steps, and step content panels. Support both horizontal and
  vertical orientations. Use React context to share state between sub-components.
  Also create a demo example and register both the component and example in the
  appropriate registries.

  Do NOT modify any existing component files. Only create new files and add
  registry entries.

setup:
  source_repo:
    url: "https://github.com/shadcn-ui/ui.git"
    ref: "shadcn@4.1.2"
  install_command: "pnpm install --no-frozen-lockfile"
  pre_commands:
    - "corepack enable pnpm || true"
    - "git config core.hooksPath /dev/null"
  timeout_minutes: 30
  max_budget_usd: 25.00

evaluation:
  # 1. Stepper component file — existence and key exports
  - type: "file-check"
    checks:
      - path: "apps/v4/registry/new-york-v4/ui/stepper.tsx"
        must_exist: true
        must_contain:
          - "use client"
          - "Stepper"
          - "StepperItem"
          - "StepperTrigger"
          - "StepperTitle"
          - "StepperSeparator"
          - "StepperContent"
          - "data-slot"
          - "cn("
    weight: 0.30

  # 2. Component structural patterns
  - type: "regex"
    file: "apps/v4/registry/new-york-v4/ui/stepper.tsx"
    patterns:
      - pattern: 'data-slot="stepper"'
        should_match: true
      - pattern: 'data-slot="stepper-item"'
        should_match: true
      - pattern: 'data-slot="stepper-trigger"'
        should_match: true
      - pattern: 'data-slot="stepper-separator"'
        should_match: true
      - pattern: 'data-slot="stepper-content"'
        should_match: true
      - pattern: "createContext|useContext"
        should_match: true
      - pattern: 'orientation.*horizontal.*vertical|horizontal.*vertical'
        should_match: true
      - pattern: "export function Stepper"
        should_match: true
    weight: 0.20

  # 3. Demo example file
  - type: "file-check"
    checks:
      - path: "apps/v4/registry/new-york-v4/examples/stepper-demo.tsx"
        must_exist: true
        must_contain:
          - "Stepper"
          - "StepperItem"
          - "StepperTrigger"
          - "StepperContent"
          - "useState"
    weight: 0.15

  # 4. Registry entries
  - type: "regex"
    file: "apps/v4/registry/new-york-v4/ui/_registry.ts"
    patterns:
      - pattern: '"stepper"'
        should_match: true
      - pattern: 'registry:ui'
        should_match: true
    weight: 0.10

  - type: "regex"
    file: "apps/v4/registry/new-york-v4/examples/_registry.ts"
    patterns:
      - pattern: '"stepper-demo"'
        should_match: true
      - pattern: 'registry:example'
        should_match: true
    weight: 0.10

  # 5. TypeScript compilation check
  - type: "build"
    command: "cd apps/v4 && npx tsc --noEmit --strict --jsx react-jsx --moduleResolution bundler --module ESNext --target ES2022 --esModuleInterop --skipLibCheck --paths '{\"@/*\": [\"./\"]}' registry/new-york-v4/ui/stepper.tsx 2>&1 | tail -20"
    weight: 0.15
