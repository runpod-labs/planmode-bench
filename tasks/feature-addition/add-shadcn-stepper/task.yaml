id: "feature-addition/add-shadcn-stepper"
name: "add stepper component"
version: 1

category: "feature-addition"
difficulty: "hard"
estimated_time_minutes: 25
tags: ["typescript", "react", "tailwindcss", "shadcn", "component", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new "Stepper" compound component to the shadcn/ui component library for
  multi-step wizards and onboarding flows. It should include sub-components for
  the container, individual step items, clickable triggers, titles, descriptions,
  separators between steps, and step content panels. Support both horizontal and
  vertical orientations. Use React context to share state between sub-components.
  Also create a demo example and register both the component and example in the
  appropriate registries.

  Do NOT modify any existing component files. Only create new files and add
  registry entries.

setup:
  source_repo:
    url: "https://github.com/shadcn-ui/ui.git"
    ref: "shadcn@4.1.2"
  install_command: "pnpm install --no-frozen-lockfile"
  pre_commands:
    - "corepack enable pnpm || true"
    - "git config core.hooksPath /dev/null"
  timeout_minutes: 30
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a Stepper compound component to the shadcn/ui library for
      multi-step wizards. Check the diff for:
      - A stepper component file marked with "use client" that exports: Stepper,
        StepperItem, StepperTrigger, StepperTitle, StepperDescription, StepperSeparator,
        StepperContent
      - Each sub-component uses a data-slot attribute (e.g., data-slot="stepper",
        data-slot="stepper-item", etc.) and the cn() utility for class merging
      - React context (createContext/useContext) to share state between sub-components
      - Support for both horizontal and vertical orientations
      - A demo example file using Stepper, StepperItem, StepperTrigger, StepperContent
        with useState for active step management
      - Registry entries for both the "stepper" UI component and "stepper-demo" example
        in their respective _registry.ts files
      - No existing component files are modified
    weight: 1.0
