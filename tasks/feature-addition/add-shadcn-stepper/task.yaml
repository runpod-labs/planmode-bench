id: "feature-addition/add-shadcn-stepper"
name: "Add Stepper Component to shadcn/ui"
version: 1

category: "feature-addition"
difficulty: "hard"
estimated_time_minutes: 25
tags: ["typescript", "react", "tailwindcss", "shadcn", "component", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new "Stepper" compound component to the shadcn/ui component library.
  The Stepper component displays a multi-step progress indicator, commonly used
  for wizards, onboarding flows, and checkout processes.

  Study the existing component patterns carefully:
  - `apps/v4/registry/new-york-v4/ui/` — all UI component source files
  - `apps/v4/registry/new-york-v4/ui/_registry.ts` — UI component registry entries
  - `apps/v4/registry/new-york-v4/examples/` — example/demo files
  - `apps/v4/registry/new-york-v4/examples/_registry.ts` — example registry entries
  - `apps/v4/lib/utils.ts` — the `cn()` utility used by all components

  Study compound component patterns like `carousel.tsx`, `tabs.tsx`, or `accordion.tsx`
  to understand how shadcn/ui builds multi-part components with React context.

  Key conventions to follow:
  - Use `"use client"` directive at the top
  - Use function declarations (not arrow functions)
  - Use `cn()` from `@/lib/utils` for className merging
  - Add `data-slot="..."` attribute on every component element
  - Use `React.ComponentProps<"element">` for prop types
  - Named exports only (no default exports)
  - Use `class-variance-authority` (cva) for visual variants

  Requirements:

  1. Create `apps/v4/registry/new-york-v4/ui/stepper.tsx` with these exports:
     - `Stepper` — root container component
       * Props: `orientation?: "horizontal" | "vertical"` (default "horizontal"),
         `activeStep: number`, `className`, standard div props
       * Uses React context to share `activeStep` and `orientation` with children
       * Renders a `<div>` with `data-slot="stepper"` and appropriate flex layout
       * data-orientation attribute matching the orientation prop
     - `StepperItem` — wrapper for each step
       * Props: `step: number`, `className`, standard div props
       * Renders `<div>` with `data-slot="stepper-item"`, `data-step`, and
         `data-state` ("completed" | "active" | "pending") based on context
     - `StepperTrigger` — clickable step indicator (the circle/number)
       * Props: `className`, standard button props
       * Renders `<button>` with `data-slot="stepper-trigger"`
       * Shows step number by default, uses children if provided
       * Styled differently based on parent StepperItem's data-state
     - `StepperTitle` — label text for a step
       * Props: `className`, standard paragraph props
       * Renders `<p>` with `data-slot="stepper-title"`
     - `StepperDescription` — description text for a step
       * Props: `className`, standard paragraph props
       * Renders `<p>` with `data-slot="stepper-description"`
     - `StepperSeparator` — line between steps
       * Props: `className`, standard div props
       * Renders `<div>` with `data-slot="stepper-separator"`
       * Styled as a line (horizontal or vertical based on orientation context)
       * Visual state changes when the NEXT step is completed
     - `StepperContent` — content panel for the active step
       * Props: `step: number`, `className`, standard div props
       * Only renders children when `step === activeStep` from context
       * Renders `<div>` with `data-slot="stepper-content"`

  2. Create `apps/v4/registry/new-york-v4/examples/stepper-demo.tsx`:
     - A demo showing a 3-step horizontal stepper (e.g., "Account", "Profile", "Complete")
     - Each step has a StepperTrigger, StepperTitle, and StepperSeparator
     - Include StepperContent panels for each step with placeholder text
     - Use `React.useState` to manage the activeStep
     - Include "Next" and "Previous" buttons to navigate between steps

  3. Add the stepper entry to `apps/v4/registry/new-york-v4/ui/_registry.ts`:
     - Follow the exact pattern of existing entries
     - `name`: `"stepper"`
     - `type`: `"registry:ui"`
     - `files`: pointing to `ui/stepper.tsx`

  4. Add the example entry to `apps/v4/registry/new-york-v4/examples/_registry.ts`:
     - `name`: `"stepper-demo"`
     - `type`: `"registry:example"`
     - `registryDependencies`: `["stepper"]`
     - `files`: pointing to `examples/stepper-demo.tsx`

  Do NOT modify any existing component files. Only create new files and add
  registry entries.

setup:
  source_repo:
    url: "https://github.com/shadcn-ui/ui.git"
    ref: "shadcn@4.1.2"
  install_command: "pnpm install --no-frozen-lockfile"
  pre_commands:
    - "corepack enable pnpm || true"
    - "git config core.hooksPath /dev/null"
  timeout_minutes: 30
  max_budget_usd: 5.00

evaluation:
  # 1. Stepper component file — existence and key exports
  - type: "file-check"
    checks:
      - path: "apps/v4/registry/new-york-v4/ui/stepper.tsx"
        must_exist: true
        must_contain:
          - "use client"
          - "Stepper"
          - "StepperItem"
          - "StepperTrigger"
          - "StepperTitle"
          - "StepperSeparator"
          - "StepperContent"
          - "data-slot"
          - "cn("
    weight: 0.30

  # 2. Component structural patterns
  - type: "regex"
    file: "apps/v4/registry/new-york-v4/ui/stepper.tsx"
    patterns:
      - pattern: 'data-slot="stepper"'
        should_match: true
      - pattern: 'data-slot="stepper-item"'
        should_match: true
      - pattern: 'data-slot="stepper-trigger"'
        should_match: true
      - pattern: 'data-slot="stepper-separator"'
        should_match: true
      - pattern: 'data-slot="stepper-content"'
        should_match: true
      - pattern: "createContext|useContext"
        should_match: true
      - pattern: 'orientation.*horizontal.*vertical|horizontal.*vertical'
        should_match: true
      - pattern: "export function Stepper"
        should_match: true
    weight: 0.20

  # 3. Demo example file
  - type: "file-check"
    checks:
      - path: "apps/v4/registry/new-york-v4/examples/stepper-demo.tsx"
        must_exist: true
        must_contain:
          - "Stepper"
          - "StepperItem"
          - "StepperTrigger"
          - "StepperContent"
          - "useState"
    weight: 0.15

  # 4. Registry entries
  - type: "regex"
    file: "apps/v4/registry/new-york-v4/ui/_registry.ts"
    patterns:
      - pattern: '"stepper"'
        should_match: true
      - pattern: 'registry:ui'
        should_match: true
    weight: 0.10

  - type: "regex"
    file: "apps/v4/registry/new-york-v4/examples/_registry.ts"
    patterns:
      - pattern: '"stepper-demo"'
        should_match: true
      - pattern: 'registry:example'
        should_match: true
    weight: 0.10

  # 5. TypeScript compilation check
  - type: "build"
    command: "cd apps/v4 && npx tsc --noEmit --strict --jsx react-jsx --moduleResolution bundler --module ESNext --target ES2022 --esModuleInterop --skipLibCheck --paths '{\"@/*\": [\"./\"]}' registry/new-york-v4/ui/stepper.tsx 2>&1 | tail -20"
    weight: 0.15
