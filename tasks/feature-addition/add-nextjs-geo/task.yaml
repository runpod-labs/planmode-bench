id: "feature-addition/add-nextjs-geo"
name: "add geolocation utility module"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "next.js", "middleware", "geolocation", "monorepo", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new `next/geo` utility module to the Next.js framework that provides
  geolocation helpers for middleware and edge functions. It should extract geo
  data from common CDN headers (Vercel's x-vercel-ip-* headers with Cloudflare
  cf-ipcountry as fallback), provide a country name lookup from country codes,
  a region membership check, and a Haversine distance calculator. Expose it as a public entry point and register it in the package.
  Include a test file. All existing code must remain unchanged.

setup:
  source_repo:
    url: "https://github.com/vercel/next.js.git"
    ref: "v16.2.2"
  install_command: "NEXT_SKIP_NATIVE_POSTINSTALL=1 pnpm install --ignore-scripts"
  pre_commands:
    - "git config core.hooksPath /dev/null"
    - "corepack enable pnpm || true"
  timeout_minutes: 30
  max_budget_usd: 25.00

evaluation:
  - type: "file-check"
    checks:
      - path: "packages/next/src/server/web/spec-extension/geo.ts"
        must_exist: true
        must_contain:
          - "Geo"
          - "geo"
          - "geoFromHeaders"
          - "isInRegion"
          - "geoDistance"
          - "x-vercel-ip-city"
          - "COUNTRY_NAMES"
      - path: "packages/next/geo.js"
        must_exist: true
        must_contain:
          - "require"
          - "geo"
          - "geoFromHeaders"
          - "isInRegion"
          - "geoDistance"
      - path: "packages/next/geo.d.ts"
        must_exist: true
        must_contain:
          - "Geo"
          - "geo"
          - "geoFromHeaders"
          - "isInRegion"
          - "geoDistance"
    weight: 0.35

  - type: "build"
    command: "cd packages/next && npx tsc --noEmit --strict --moduleResolution node --module ESNext --target ES2018 --esModuleInterop --jsx react-jsx src/server/web/spec-extension/geo.ts 2>&1 | tail -20"
    weight: 0.25

  - type: "regex"
    file: "packages/next/src/server/web/spec-extension/geo.ts"
    patterns:
      - pattern: "interface Geo"
        should_match: true
      - pattern: "export function geo"
        should_match: true
      - pattern: "export function geoFromHeaders"
        should_match: true
      - pattern: "export function isInRegion"
        should_match: true
      - pattern: "export function geoDistance"
        should_match: true
      - pattern: "x-vercel-ip-country"
        should_match: true
      - pattern: "cf-ipcountry"
        should_match: true
      - pattern: "Haversine|haversine|Math\\.asin|Math\\.atan2"
        should_match: true
    weight: 0.2

  - type: "regex"
    file: "packages/next/package.json"
    patterns:
      - pattern: "geo\\.js"
        should_match: true
      - pattern: "geo\\.d\\.ts"
        should_match: true
    weight: 0.1

  - type: "file-check"
    checks:
      - path: "packages/next/src/server/web/spec-extension/geo.test.ts"
        must_exist: true
        must_contain:
          - "geo"
          - "geoDistance"
          - "isInRegion"
          - "Headers"
    weight: 0.1
