id: "feature-addition/add-nextjs-geo"
name: "add geolocation utility module"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "next.js", "middleware", "geolocation", "monorepo", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new `next/geo` utility module to the Next.js framework that provides
  geolocation helpers for middleware and edge functions. It should extract geo
  data from common CDN headers (Vercel's x-vercel-ip-* headers with Cloudflare
  cf-ipcountry as fallback), provide a country name lookup from country codes,
  a region membership check, and a Haversine distance calculator. Expose it as a public entry point and register it in the package.
  Include a test file. All existing code must remain unchanged.

setup:
  source_repo:
    url: "https://github.com/vercel/next.js.git"
    ref: "v16.2.2"
  install_command: "NEXT_SKIP_NATIVE_POSTINSTALL=1 pnpm install --ignore-scripts"
  pre_commands:
    - "git config core.hooksPath /dev/null"
    - "corepack enable pnpm || true"
  timeout_minutes: 30
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a next/geo utility module to the Next.js framework.
      Check the diff for:
      - A Geo interface and exported functions: geoFromHeaders, isInRegion, geoDistance
      - geoFromHeaders extracts geo data from Vercel x-vercel-ip-* headers with
        Cloudflare cf-ipcountry as fallback
      - A COUNTRY_NAMES lookup from country codes to country names
      - isInRegion checks region membership
      - geoDistance implements Haversine distance calculation (uses Math.asin or Math.atan2)
      - A public entry point (JS file) that re-exports the functions via require
      - A TypeScript declaration file (.d.ts) with proper type signatures
      - The package.json is updated to register the geo entry point
      - A test file covering geo, geoDistance, isInRegion with Headers usage
      - All existing code remains unchanged
    weight: 1.0
