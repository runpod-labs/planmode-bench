id: "feature-addition/add-pagination"
name: "add pagination to users API"
version: 1

category: "feature-addition"
difficulty: "medium"
estimated_time_minutes: 15
tags: ["typescript", "api", "express", "pagination"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  The GET /users endpoint currently returns all users at once. Add pagination
  support with `page` and `limit` query parameters. The response should include
  both the paginated data and pagination metadata (page, limit, total, totalPages).
  Out-of-range pages should return an empty array, not an error. All tests should pass.

setup:
  install_command: "npm install"
  timeout_minutes: 10
  max_budget_usd: 25.00

evaluation:
  - type: "test-suite"
    command: "npx vitest run"
    weight: 0.5

  - type: "test-integrity"
    weight: 0.1

  - type: "file-check"
    checks:
      - path: "src/routes.ts"
        must_exist: true
        must_contain:
          - "pagination"
          - "totalPages"
    weight: 0.2

  - type: "build"
    command: "npx tsc --noEmit"
    weight: 0.2
