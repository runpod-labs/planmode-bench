id: "feature-addition/add-uv-cache-stats"
name: "add 'uv cache stats' subcommand"
version: 1
category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 25
tags: ["rust", "cli", "clap", "cache", "uv", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  `uv cache size` shows the total cache size. Add a new `uv cache stats`
  subcommand that shows a per-bucket breakdown of cache usage (wheels, sdists,
  git, etc.) with a total at the end. Support a --human flag for human-readable
  sizes. Wire it through the CLI definition, command dispatch, and module
  registration.

  Do NOT run cargo build or cargo check -- only modify source files.

setup:
  source_repo:
    url: "https://github.com/astral-sh/uv.git"
    ref: "0.11.3"
  install_command: "echo 'source-only task'"
  timeout_minutes: 25
  max_budget_usd: 25.00

evaluation:
  # ── 1. CLI definition: StatsArgs struct + CacheCommand::Stats variant ──
  - type: "file-check"
    checks:
      - path: "crates/uv-cli/src/lib.rs"
        must_exist: true
        must_contain:
          - "Stats"
          - "StatsArgs"
          - "per-bucket"
    weight: 0.15

  - type: "regex"
    file: "crates/uv-cli/src/lib.rs"
    patterns:
      - pattern: "Stats\\(StatsArgs\\)"
        should_match: true
      - pattern: "struct StatsArgs"
        should_match: true
      - pattern: "human.*bool|bool.*human"
        should_match: true
    weight: 0.10

  # ── 2. New command implementation file ──
  - type: "file-check"
    checks:
      - path: "crates/uv/src/commands/cache_stats.rs"
        must_exist: true
        must_contain:
          - "cache_stats"
          - "CacheBucket"
          - "DiskUsage"
          - "ExitStatus"
          - "human_readable_bytes"
          - "total"
    weight: 0.25

  - type: "regex"
    file: "crates/uv/src/commands/cache_stats.rs"
    patterns:
      - pattern: "pub\\(crate\\) fn cache_stats"
        should_match: true
      - pattern: "CacheBucket::iter\\(\\)"
        should_match: true
      - pattern: "cache\\.bucket\\("
        should_match: true
      - pattern: "DiskUsage"
        should_match: true
      - pattern: "ExitStatus::Success"
        should_match: true
    weight: 0.20

  # ── 3. Module registration in mod.rs ──
  - type: "file-check"
    checks:
      - path: "crates/uv/src/commands/mod.rs"
        must_exist: true
        must_contain:
          - "cache_stats"
    weight: 0.10

  - type: "regex"
    file: "crates/uv/src/commands/mod.rs"
    patterns:
      - pattern: "mod cache_stats;"
        should_match: true
      - pattern: "use cache_stats::cache_stats"
        should_match: true
    weight: 0.05

  # ── 4. Dispatch wiring in lib.rs ──
  - type: "regex"
    file: "crates/uv/src/lib.rs"
    patterns:
      - pattern: "CacheCommand::Stats"
        should_match: true
      - pattern: "commands::cache_stats"
        should_match: true
    weight: 0.15
