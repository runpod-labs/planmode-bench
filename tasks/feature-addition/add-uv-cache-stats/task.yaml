id: "feature-addition/add-uv-cache-stats"
name: "add 'uv cache stats' subcommand"
version: 1
category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 25
tags: ["rust", "cli", "clap", "cache", "uv", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  `uv cache size` shows the total cache size. Add a new `uv cache stats`
  subcommand that shows a per-bucket breakdown of cache usage (wheels, sdists,
  git, etc.) with a total at the end. Support a --human flag for human-readable
  sizes. Wire it through all the layers so the command works end to end.

  Do NOT run cargo build or cargo check -- only modify source files.

setup:
  source_repo:
    url: "https://github.com/astral-sh/uv.git"
    ref: "0.11.3"
  install_command: "echo 'source-only task'"
  timeout_minutes: 25
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a `uv cache stats` subcommand to the uv CLI.
      Check the diff for:
      - A new CLI variant/subcommand for "stats" in the cache command enum
        (Stats(StatsArgs) variant and a StatsArgs struct with a human bool flag)
      - A new command implementation that iterates over cache buckets (CacheBucket::iter())
        and computes disk sizes using DiskUsage
      - The function is pub(crate) fn cache_stats and returns ExitStatus::Success
      - A --human flag for human-readable output using human_readable_bytes
      - Output includes per-bucket lines and a total line
      - Module registration: mod cache_stats and use cache_stats::cache_stats in mod.rs
      - Dispatch wiring: CacheCommand::Stats matched in lib.rs calling commands::cache_stats
      - Code follows the same patterns as the existing `cache size` command
    weight: 1.0
