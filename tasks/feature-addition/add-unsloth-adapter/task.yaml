id: "feature-addition/add-unsloth-adapter"
name: "add ONNX LoRA adapter export"
version: 1
category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 25
tags: ["python", "ml", "lora", "unsloth", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add an `export_to_onnx` method to unsloth that exports LoRA adapter weights
  (A and B matrices) to ONNX format. It should save to a specified output
  directory with metadata (rank, alpha, target modules) and accept an
  opset_version parameter (default 17). Expose it alongside the existing save
  and export methods.

  Do NOT try to run or install unsloth. Only modify source files.

setup:
  source_repo:
    url: "https://github.com/unslothai/unsloth.git"
    ref: "September-2025-v3"
  install_command: "echo 'source-only task'"
  timeout_minutes: 25
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add an export_to_onnx method to unsloth for exporting LoRA
      adapter weights to ONNX format. Check the diff for:
      - A new export_to_onnx function or method that saves LoRA adapter A and B matrices
      - The method accepts an output directory path and an opset_version parameter
        (defaulting to 17)
      - Metadata is saved alongside the ONNX file (rank, alpha, target modules)
      - The function is exposed alongside existing save and export methods (e.g.,
        registered in the model class or exported from a module init)
      - The implementation uses ONNX export utilities (e.g., torch.onnx.export or
        onnx helper libraries)
      - Code follows the existing unsloth patterns and conventions
    weight: 1.0
