id: "feature-addition/add-vllm-sampler"
name: "add Top-A sampling strategy"
version: 1
category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 25
tags: ["python", "ml", "sampling", "vllm", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add "Top-A" sampling to vLLM. Top-A keeps only tokens whose probability is at
  least `top_a * max_probability`, then renormalizes. Add a `top_a` parameter
  (float, default 0.0 meaning disabled, valid range [0.0, 1.0]) to the sampling
  params and implement the filtering logic in the sampler. Thread the value
  through any intermediate data structures as needed.

  Do NOT try to run or install vLLM. Only modify source files.

setup:
  source_repo:
    url: "https://github.com/vllm-project/vllm.git"
    ref: "v0.9.2"
  install_command: "echo 'source-only task'"
  timeout_minutes: 25
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add "Top-A" sampling to vLLM. Top-A keeps only tokens whose
      probability is at least top_a * max_probability, then renormalizes.
      Check the diff for:
      - A top_a parameter added to the sampling params class as a float with default 0.0
        (meaning disabled) and valid range [0.0, 1.0]
      - The filtering logic implemented in the sampler: compute max probability, mask
        tokens below top_a * max_prob, then renormalize
      - The top_a value is threaded through any intermediate data structures between
        sampling params and the sampler
      - The parameter has proper documentation/docstring
      - Code is syntactically valid Python following vLLM conventions
    weight: 1.0
