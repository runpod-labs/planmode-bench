id: "feature-addition/add-vllm-sampler"
name: "add Top-A sampling strategy"
version: 1
category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 25
tags: ["python", "ml", "sampling", "vllm", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add "Top-A" sampling to vLLM. Top-A keeps only tokens whose probability is at
  least `top_a * max_probability`, then renormalizes. Add a `top_a` parameter
  (float, default 0.0 meaning disabled, valid range [0.0, 1.0]) to the sampling
  params and implement the filtering logic in the sampler. Thread the value
  through any intermediate data structures as needed.

  Do NOT try to run or install vLLM. Only modify source files.

setup:
  source_repo:
    url: "https://github.com/vllm-project/vllm.git"
    ref: "v0.9.2"
  install_command: "echo 'source-only task'"
  timeout_minutes: 25
  max_budget_usd: 25.00

evaluation:
  - type: "file-check"
    checks:
      - path: "vllm/sampling_params.py"
        must_exist: true
        must_contain:
          - "top_a"
    weight: 0.35
  - type: "regex"
    file: "vllm/sampling_params.py"
    patterns:
      - pattern: "top_a.*float|float.*top_a"
        should_match: true
      - pattern: "0\\.0.*top_a|top_a.*0\\.0"
        should_match: true
    weight: 0.25
  - type: "build"
    command: "python3 -c 'import ast; ast.parse(open(\"vllm/sampling_params.py\").read()); print(\"Syntax OK\")'"
    weight: 0.2
  - type: "regex"
    file: "vllm/sampling_params.py"
    patterns:
      - pattern: "top_a"
        should_match: true
    weight: 0.2
