id: "feature-addition/add-rate-limiter"
name: "add rate limiting middleware"
version: 1

category: "feature-addition"
difficulty: "hard"
estimated_time_minutes: 25
tags: ["python", "fastapi", "middleware", "rate-limiting", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  Add a rate limiting middleware to FastAPI using a token bucket algorithm. It
  should be per-client IP, configurable (requests per minute, burst size), and
  return 429 with a retry_after value when the limit is exceeded. Include
  X-RateLimit-* response headers on all responses. Export it from the middleware
  package and make sure all tests pass (existing and new).

setup:
  source_repo:
    url: "https://github.com/fastapi/fastapi.git"
    ref: "0.135.3"
  install_command: "pip3 install -e '.[all,dev,test]'"
  pre_commands:
    - "pip3 install httpx"
  timeout_minutes: 30
  max_budget_usd: 25.00

evaluation:
  - type: "test-suite"
    command: "python3 -m pytest tests/test_rate_limiter.py -v"
    weight: 0.35

  - type: "test-integrity"
    weight: 0.05

  - type: "file-check"
    checks:
      - path: "fastapi/middleware/rate_limit.py"
        must_exist: true
        must_contain:
          - "RateLimitMiddleware"
          - "token_bucket"
          - "429"
          - "X-RateLimit"
    weight: 0.3

  - type: "build"
    command: "python3 -c 'from fastapi.middleware.rate_limit import RateLimitMiddleware; print(\"Import OK\")'"
    weight: 0.2

  - type: "regex"
    file: "fastapi/middleware/rate_limit.py"
    patterns:
      - pattern: "class RateLimitMiddleware"
        should_match: true
      - pattern: "requests_per_minute"
        should_match: true
      - pattern: "retry_after"
        should_match: true
    weight: 0.1
