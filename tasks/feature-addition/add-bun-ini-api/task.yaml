id: "feature-addition/add-bun-ini-api"
name: "add Bun.INI namespace API"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["zig", "typescript", "cpp", "bun", "runtime", "api", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Bun exposes format namespaces like `Bun.TOML`, `Bun.JSONC`, `Bun.JSON5`, and
  `Bun.YAML` as public APIs. Add a new `Bun.INI` namespace with `parse` and
  `stringify` methods following the same pattern. The parse method should handle
  INI sections (as nested objects), key=value pairs, and comment lines (; and #).
  Wire it up through all the necessary layers so it works end to end.

  Do NOT try to build Bun. Only modify source files. The INI parser should be
  self-contained (do not import the internal npm INI parser).

setup:
  source_repo:
    url: "https://github.com/oven-sh/bun.git"
    ref: "bun-v1.3.11"
  install_command: "echo 'source-only task — no build required'"
  timeout_minutes: 30
  max_budget_usd: 25.00

evaluation:
  # 1. Core Zig implementation file
  - type: "file-check"
    checks:
      - path: "src/bun.js/api/INIObject.zig"
        must_exist: true
        must_contain:
          - "create"
          - "parse"
          - "stringify"
          - "jsc.JSGlobalObject"
          - "jsc.JSValue"
          - "bun.JSError"
    weight: 0.25

  # 2. INIObject.zig follows Zig patterns
  - type: "regex"
    file: "src/bun.js/api/INIObject.zig"
    patterns:
      - pattern: "pub fn create\\(globalThis: \\*jsc\\.JSGlobalObject\\) jsc\\.JSValue"
        should_match: true
      - pattern: "pub fn parse\\("
        should_match: true
      - pattern: "pub fn stringify\\("
        should_match: true
      - pattern: 'ZigString\.static\("parse"\)'
        should_match: true
      - pattern: 'ZigString\.static\("stringify"\)'
        should_match: true
      - pattern: "jsc\\.JSFunction\\.create"
        should_match: true
      - pattern: "@import\\(\"bun\"\\)"
        should_match: true
    weight: 0.15

  # 3. BunObject.zig wiring
  - type: "regex"
    file: "src/bun.js/api/BunObject.zig"
    patterns:
      - pattern: "INI.*toJSLazyPropertyCallback|toJSLazyPropertyCallback.*INI"
        should_match: true
      - pattern: "getINIObject"
        should_match: true
      - pattern: "INIObject"
        should_match: true
    weight: 0.15

  # 4. C++ header exports
  - type: "regex"
    file: "src/bun.js/bindings/BunObject+exports.h"
    patterns:
      - pattern: "macro\\(INI\\)"
        should_match: true
    weight: 0.10

  # 5. C++ hash table entry
  - type: "regex"
    file: "src/bun.js/bindings/BunObject.cpp"
    patterns:
      - pattern: "INI.*BunObject_lazyPropCb_wrap_INI|BunObject_lazyPropCb_wrap_INI.*INI"
        should_match: true
    weight: 0.10

  # 6. TypeScript type definitions
  - type: "regex"
    file: "packages/bun-types/bun.d.ts"
    patterns:
      - pattern: "namespace INI"
        should_match: true
      - pattern: "parse.*input.*string"
        should_match: true
      - pattern: "stringify.*input"
        should_match: true
    weight: 0.15

  # 7. Syntax validation of the Zig file (basic check)
  - type: "build"
    command: "grep -c 'pub fn' src/bun.js/api/INIObject.zig | xargs test 1 -lt"
    weight: 0.10
