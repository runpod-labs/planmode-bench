id: "feature-addition/add-bun-ini-api"
name: "add Bun.INI namespace API"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["zig", "typescript", "cpp", "bun", "runtime", "api", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Bun exposes format namespaces like `Bun.TOML`, `Bun.JSONC`, `Bun.JSON5`, and
  `Bun.YAML` as public APIs. Add a new `Bun.INI` namespace with `parse` and
  `stringify` methods following the same pattern. The parse method should handle
  INI sections (as nested objects), key=value pairs, and comment lines (; and #).
  Wire it up through all the necessary layers so it works end to end.

  Do NOT try to build Bun. Only modify source files. The INI parser should be
  self-contained (do not import the internal npm INI parser).

setup:
  source_repo:
    url: "https://github.com/oven-sh/bun.git"
    ref: "bun-v1.3.11"
  install_command: "echo 'source-only task — no build required'"
  timeout_minutes: 30
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a Bun.INI namespace API with parse and stringify methods,
      following the same pattern as Bun.TOML, Bun.JSONC, Bun.JSON5, and Bun.YAML.
      Check the diff for:
      - A new Zig implementation file for the INI object with create, parse, and stringify
        public functions that accept JSGlobalObject and return JSValue
      - The parse function handles INI sections (nested objects), key=value pairs, and
        comment lines (both ; and #)
      - Wiring in BunObject.zig via a lazy property callback for "INI"
      - C++ exports header updated with a macro entry for INI
      - C++ hash table entry for the INI lazy property callback
      - TypeScript type definitions with a namespace INI containing parse and stringify signatures
      - The INI parser is self-contained (does not import the internal npm INI parser)
      - Code follows Zig conventions: uses jsc.JSFunction.create, ZigString.static, @import("bun")
    weight: 1.0
