id: "feature-addition/add-t3code-theme"
name: "add custom theme system"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "editor", "theming", "monorepo", "turbo", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a custom theme system to the T3 Code editor. Define a theme type in the
  shared package with at least 3 built-in themes ("t3-dark", "t3-light",
  "t3-midnight") covering colors for background, foreground, accent, sidebar,
  editor, terminal, and status bar. Create a theme provider and useTheme hook in
  the web app that persists selection to local storage and applies CSS custom
  properties. Add a theme selector component with preview swatches.

  Do NOT modify the build configuration or add new dependencies.

setup:
  source_repo:
    url: "https://github.com/pingdotgg/t3code.git"
    ref: "v0.0.9"
  install_command: "bun install"
  timeout_minutes: 30
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a custom theme system to the T3 Code editor.
      Check the diff for:
      - A theme type definition (interface or type) in the shared package with color
        properties for background, foreground, accent, sidebar, editor, terminal,
        and status bar
      - At least 3 built-in themes: "t3-dark", "t3-light", and "t3-midnight"
      - Exported getTheme and listThemes utility functions in the shared package
      - A ThemeProvider component and useTheme hook in the web app that persists
        the selected theme to local storage and applies CSS custom properties
      - A ThemeSelector component with preview swatches for theme selection
      - No build configuration changes or new dependencies added
    weight: 1.0
