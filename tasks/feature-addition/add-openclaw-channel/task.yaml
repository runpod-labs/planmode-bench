id: "feature-addition/add-openclaw-channel"
name: "add fictional PulseBoard channel"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "plugin", "channel", "openclaw", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new fictional "PulseBoard" channel plugin to OpenClaw. PulseBoard is an
  imaginary real-time bulletin board messaging platform where users post messages
  to named "boards" and can also send direct messages. It should support both
  direct and group chat types, with a 4000-character text chunk limit. Follow the
  same extension structure as existing channel plugins (like IRC, Nostr, or
  Telegram) including package manifest, plugin manifest, types, runtime store,
  channel plugin, and entry points.

  Do NOT modify any existing files. Only create new files in the pulseboard
  extension directory.

setup:
  source_repo:
    url: "https://github.com/openclaw/openclaw.git"
    ref: "v2026.4.2"
  install_command: "pnpm install --no-frozen-lockfile"
  pre_commands:
    - "corepack enable pnpm || true"
    - "git config core.hooksPath /dev/null"
  timeout_minutes: 30
  max_budget_usd: 25.00

evaluation:
  # 1. Package manifest files
  - type: "file-check"
    checks:
      - path: "extensions/pulseboard/package.json"
        must_exist: true
        must_contain:
          - "@openclaw/pulseboard"
          - "openclaw"
          - "pulseboard"
          - "module"
          - "setupEntry"
      - path: "extensions/pulseboard/openclaw.plugin.json"
        must_exist: true
        must_contain:
          - "pulseboard"
          - "channels"
          - "configSchema"
    weight: 0.15

  # 2. Types file
  - type: "file-check"
    checks:
      - path: "extensions/pulseboard/src/types.ts"
        must_exist: true
        must_contain:
          - "PulseBoardAccount"
          - "PulseBoardConfig"
          - "PulseBoardMessage"
          - "boardUrl"
          - "apiToken"
    weight: 0.10

  # 3. Runtime store
  - type: "file-check"
    checks:
      - path: "extensions/pulseboard/src/runtime.ts"
        must_exist: true
        must_contain:
          - "createPluginRuntimeStore"
          - "getPulseBoardRuntime"
          - "setPulseBoardRuntime"
    weight: 0.10

  # 4. Channel plugin (the core of the task)
  - type: "file-check"
    checks:
      - path: "extensions/pulseboard/src/channel.ts"
        must_exist: true
        must_contain:
          - "createChatChannelPlugin"
          - "pulseboard"
          - "PulseBoard"
          - "capabilities"
          - "outbound"
          - "sendText"
          - "gateway"
          - "messaging"
    weight: 0.25

  - type: "regex"
    file: "extensions/pulseboard/src/channel.ts"
    patterns:
      - pattern: "createChatChannelPlugin"
        should_match: true
      - pattern: "chatTypes.*direct.*group|chatTypes.*group.*direct"
        should_match: true
      - pattern: "textChunkLimit.*4000"
        should_match: true
      - pattern: "deliveryMode.*direct"
        should_match: true
      - pattern: "normalizeTarget"
        should_match: true
    weight: 0.15

  # 5. Entry points
  - type: "file-check"
    checks:
      - path: "extensions/pulseboard/index.ts"
        must_exist: true
        must_contain:
          - "defineChannelPluginEntry"
          - "pulseBoardPlugin"
          - "setPulseBoardRuntime"
          - "pulseboard"
      - path: "extensions/pulseboard/setup-entry.ts"
        must_exist: true
        must_contain:
          - "defineSetupPluginEntry"
          - "pulseBoardPlugin"
    weight: 0.15

  # 6. Build check — TypeScript compilation
  - type: "build"
    command: "cd extensions/pulseboard && npx tsc --noEmit --strict --moduleResolution bundler --module ESNext --target ES2022 --esModuleInterop --skipLibCheck src/types.ts 2>&1 | tail -20"
    weight: 0.10
