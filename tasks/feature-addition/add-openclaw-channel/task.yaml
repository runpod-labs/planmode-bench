id: "feature-addition/add-openclaw-channel"
name: "add fictional PulseBoard channel"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "plugin", "channel", "openclaw", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new fictional "PulseBoard" channel plugin to OpenClaw. PulseBoard is an
  imaginary real-time bulletin board messaging platform where users post messages
  to named "boards" and can also send direct messages. It should support both
  direct and group chat types, with a 4000-character text chunk limit. Follow the same extension structure as existing channel plugins (like IRC,
  Nostr, or Telegram).

  Do NOT modify any existing files. Only create new files in the pulseboard
  extension directory.

setup:
  source_repo:
    url: "https://github.com/openclaw/openclaw.git"
    ref: "v2026.4.2"
  install_command: "pnpm install --no-frozen-lockfile"
  pre_commands:
    - "corepack enable pnpm || true"
    - "git config core.hooksPath /dev/null"
  timeout_minutes: 30
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a fictional "PulseBoard" channel plugin to OpenClaw,
      following the same extension structure as existing channel plugins (IRC, Nostr, Telegram).
      Check the diff for:
      - A package.json with @openclaw/pulseboard scoped name and setupEntry field
      - An openclaw.plugin.json with channels and configSchema definitions
      - Types file with PulseBoardAccount, PulseBoardConfig, PulseBoardMessage interfaces
        including boardUrl and apiToken fields
      - A runtime store using createPluginRuntimeStore with get/set accessors
      - A channel plugin file using createChatChannelPlugin with:
        - chatTypes supporting both direct and group
        - textChunkLimit of 4000
        - outbound sendText capability, gateway, messaging, and normalizeTarget
      - An index entry point using defineChannelPluginEntry
      - A setup entry point using defineSetupPluginEntry
      - No existing files are modified; only new files in the pulseboard extension directory
    weight: 1.0
