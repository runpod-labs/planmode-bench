id: "feature-addition/add-llamacpp-chat-template"
name: "add Mistral Instruct v3 chat template"
version: 1

category: "feature-addition"
difficulty: "hard"
estimated_time_minutes: 25
tags: ["c++", "llm-inference", "chat-template", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  Add a specialized "mistral-instruct-v3" chat template handler to llama.cpp for
  the Mistral Instruct v0.3 format. The format wraps user turns with [INST]/[/INST]
  markers, prepends system messages to the first user turn, and appends </s> after
  assistant turns. Register it with template auto-detection (distinguish it from the
  existing Ministral 3 handler by checking for the absence of [SYSTEM_PROMPT]).
  Only add new code -- do not modify any existing handlers or the header file.

setup:
  source_repo:
    url: "https://github.com/ggml-org/llama.cpp.git"
    ref: "b8657"
  install_command: "echo 'No build needed -- evaluation checks source files only'"
  timeout_minutes: 25
  max_budget_usd: 25.00

evaluation:
  - type: "file-check"
    checks:
      - path: "common/chat.cpp"
        must_exist: true
        must_contain:
          - "mistral_instruct_v3"
          - "common_chat_params_init_mistral_instruct_v3"
          - "[INST]"
          - "[/INST]"
          - "COMMON_CHAT_FORMAT_CONTENT_ONLY"
    weight: 0.4

  - type: "regex"
    file: "common/chat.cpp"
    patterns:
      - pattern: "static common_chat_params common_chat_params_init_mistral_instruct_v3"
        should_match: true
      - pattern: "\\[INST\\].*\\[/INST\\]"
        should_match: true
      - pattern: "LOG_DBG.*[Mm]istral [Ii]nstruct v3"
        should_match: true
      - pattern: "common_chat_params_init_mistral_instruct_v3\\(tmpl, params\\)"
        should_match: true
    weight: 0.3

  - type: "build"
    command: "grep -c 'mistral_instruct_v3' common/chat.cpp"
    weight: 0.3
