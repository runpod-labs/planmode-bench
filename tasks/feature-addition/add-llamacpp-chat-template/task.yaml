id: "feature-addition/add-llamacpp-chat-template"
name: "add Mistral Instruct v3 chat template"
version: 1

category: "feature-addition"
difficulty: "hard"
estimated_time_minutes: 25
tags: ["c++", "llm-inference", "chat-template", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  Add a specialized "mistral-instruct-v3" chat template handler to llama.cpp for
  the Mistral Instruct v0.3 format. The format wraps user turns with [INST]/[/INST]
  markers, prepends system messages to the first user turn, and appends </s> after
  assistant turns. Register it with template auto-detection (distinguish it from the
  existing Ministral 3 handler by checking for the absence of [SYSTEM_PROMPT]).
  Only add new code -- do not modify any existing handlers or the header file.

setup:
  source_repo:
    url: "https://github.com/ggml-org/llama.cpp.git"
    ref: "b8657"
  install_command: "echo 'No build needed -- evaluation checks source files only'"
  timeout_minutes: 25
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a "mistral-instruct-v3" chat template handler to llama.cpp.
      Check the diff for:
      - A new static function common_chat_params_init_mistral_instruct_v3 in the chat source
      - The handler wraps user turns with [INST]/[/INST] markers
      - System messages are prepended to the first user turn
      - </s> is appended after assistant turns
      - Template auto-detection is registered, distinguishing from the existing Ministral 3
        handler by checking for the absence of [SYSTEM_PROMPT]
      - A LOG_DBG call identifying the Mistral Instruct v3 template
      - Uses COMMON_CHAT_FORMAT_CONTENT_ONLY as the format
      - The handler is dispatched from the template detection function with (tmpl, params)
      - No existing handlers or the header file are modified
    weight: 1.0
