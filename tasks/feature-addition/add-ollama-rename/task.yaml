id: "feature-addition/add-ollama-rename"
name: "add model rename API endpoint and CLI command"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["go", "api", "cli", "gin", "cobra", "real-codebase", "large-repo", "ollama"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a model rename feature to Ollama so users can rename a local model in one
  operation instead of copy + delete. This needs a new API endpoint
  (POST /api/rename), a corresponding client method, a server handler that
  copies then deletes the source, and a CLI command (`ollama rename SOURCE DEST`).
  The handler should return 404 if the source doesn't exist and 409 if the
  destination already exists.

  Do NOT try to build or run Ollama. Only modify source files.
  Do NOT modify any test files. All existing code must remain intact.

setup:
  source_repo:
    url: "https://github.com/ollama/ollama.git"
    ref: "v0.20.2"
  install_command: "echo 'source-only task -- no build required'"
  timeout_minutes: 30
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a model rename feature to Ollama with API, client, server,
      and CLI layers. Check the diff for:
      - A RenameRequest struct in the API types with Source and Destination string fields
        (json-tagged as "source" and "destination")
      - A Client.Rename method in the API client that POSTs to /api/rename
      - A RenameHandler on the Server in routes that copies the model then deletes the
        source, returns 404 if source missing and 409 if destination exists
      - Route registration: r.POST("/api/rename", ...) wired to the handler
      - A CLI command "ollama rename SOURCE DEST" using cobra with ExactArgs(2)
      - The CLI RenameHandler function calls the client Rename method
      - No existing test files are modified; all existing code remains intact
    weight: 1.0
