id: "feature-addition/add-sglang-constraint"
name: "add JSON path constraint"
version: 1
category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 25
tags: ["python", "ml", "constraints", "sglang", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new "json_path" output constraint to SGLang that validates generated
  output is valid JSON containing a specified JSON path pattern (e.g.,
  "$.store.book[*].author"). Register it alongside the existing constraints
  so it can be used in SGLang programs.

  Do NOT try to run or install SGLang. Only modify source files.

setup:
  source_repo:
    url: "https://github.com/sgl-project/sglang.git"
    ref: "v0.5.9"
  install_command: "echo 'source-only task'"
  timeout_minutes: 25
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a "json_path" output constraint to SGLang that validates
      generated output contains a specified JSON path pattern (e.g., "$.store.book[*].author").
      Check the diff for:
      - A new constraint class or function for json_path in the SGLang lang/IR layer
      - The constraint validates that output is valid JSON containing the specified path
      - Registration alongside existing constraints so it can be used in SGLang programs
      - The json_path or JsonPath identifier appears in the IR definitions
      - The implementation follows the same patterns as existing SGLang constraints
    weight: 1.0
