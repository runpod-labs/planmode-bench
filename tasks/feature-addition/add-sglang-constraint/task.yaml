id: "feature-addition/add-sglang-constraint"
name: "Add JSON Path Constraint to SGLang"
version: 1
category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 25
tags: ["python", "ml", "constraints", "sglang", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new "json_path" output constraint to SGLang that constrains LLM output
  to match a specific JSON path pattern.

  Study how existing constraints work in the SGLang codebase (look at how
  regex constraints, JSON schema constraints, or choice constraints are
  implemented).

  Requirements:
  1. Add a `json_path_constraint` function/class in the appropriate module
  2. It should accept a JSON path pattern (e.g., "$.store.book[*].author")
  3. The constraint should validate that the generated output is valid JSON
     and that the specified path exists in the output
  4. Register the constraint so it can be used in SGLang programs
  5. Add appropriate type hints and docstrings

  Do NOT try to run or install SGLang. Only modify source files.

setup:
  source_repo:
    url: "https://github.com/sgl-project/sglang.git"
    ref: "v0.5.9"
  install_command: "echo 'source-only task'"
  timeout_minutes: 25
  max_budget_usd: 25.00

evaluation:
  - type: "file-check"
    checks:
      - path: "python/sglang"
        must_exist: true
    weight: 0.3
  - type: "build"
    command: "grep -r 'json_path' python/sglang/ | wc -l | xargs test 0 -lt"
    weight: 0.4
  - type: "regex"
    file: "python/sglang/lang/ir.py"
    patterns:
      - pattern: "json_path|JsonPath"
        should_match: true
    weight: 0.3
