id: "feature-addition/add-prisma-generator"
name: "Add REST API Client Generator to Prisma"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "prisma", "code-generation", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new Prisma generator package that generates a typed REST API client
  from a Prisma schema. Study how existing generators work in the Prisma monorepo
  (look at `packages/generator-helper/`, `packages/client/`, and the generator
  protocol).

  Create a new package at `packages/generator-rest-client/` with:

  1. `package.json` with proper name (`@prisma/generator-rest-client`) and dependencies
  2. `tsconfig.json` following the monorepo conventions
  3. `src/index.ts` - Entry point that implements the generator protocol:
     - Export a `generatorHandler` that implements `GeneratorManifest` and `GeneratorOptions`
     - Handle the `onGenerate` callback
  4. `src/generator.ts` - The main generation logic:
     - Parse the DMMF (Data Model Meta Format) from `options.dmmf`
     - For each model in the schema, generate:
       - A typed interface for the model
       - CRUD methods: `findMany`, `findUnique`, `create`, `update`, `delete`
       - Each method should be properly typed with the model's fields
     - Output a single `rest-client.ts` file
  5. `src/template.ts` - String template helpers for code generation

  The generator should be usable in a Prisma schema like:
  ```prisma
  generator restClient {
    provider = "prisma-generator-rest-client"
    output   = "./generated/rest-client"
  }
  ```

  Follow existing Prisma monorepo patterns for package structure, tsconfig, and naming.

setup:
  source_repo:
    url: "https://github.com/prisma/prisma.git"
    ref: "7.6.0"
  install_command: "pnpm install --no-frozen-lockfile"
  timeout_minutes: 30
  max_budget_usd: 5.00

evaluation:
  - type: "file-check"
    checks:
      - path: "packages/generator-rest-client/package.json"
        must_exist: true
        must_contain:
          - "prisma"
          - "generator"
      - path: "packages/generator-rest-client/src/index.ts"
        must_exist: true
        must_contain:
          - "generatorHandler"
          - "onGenerate"
      - path: "packages/generator-rest-client/src/generator.ts"
        must_exist: true
        must_contain:
          - "dmmf"
          - "findMany"
          - "create"
    weight: 0.4

  - type: "build"
    command: "cd packages/generator-rest-client && npx tsc --noEmit"
    weight: 0.3

  - type: "regex"
    file: "packages/generator-rest-client/src/generator.ts"
    patterns:
      - pattern: "findUnique|findMany"
        should_match: true
      - pattern: "model|Model"
        should_match: true
      - pattern: "interface|type"
        should_match: true
    weight: 0.15

  - type: "regex"
    file: "packages/generator-rest-client/src/index.ts"
    patterns:
      - pattern: "generatorHandler"
        should_match: true
      - pattern: "onGenerate|onManifest"
        should_match: true
    weight: 0.15
