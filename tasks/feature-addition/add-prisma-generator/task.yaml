id: "feature-addition/add-prisma-generator"
name: "add REST API client generator"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "prisma", "code-generation", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new Prisma generator package that generates a typed REST API client from
  a Prisma schema. For each model it should generate a TypeScript interface and
  CRUD methods (findMany, findUnique, create, update, delete) with proper types.
  The generator should implement the standard Prisma generator protocol and
  output the generated client. Follow the existing monorepo package structure.

setup:
  source_repo:
    url: "https://github.com/prisma/prisma.git"
    ref: "7.6.0"
  install_command: "pnpm install --no-frozen-lockfile"
  timeout_minutes: 30
  max_budget_usd: 25.00

evaluation:
  - type: "file-check"
    checks:
      - path: "packages/generator-rest-client/package.json"
        must_exist: true
        must_contain:
          - "prisma"
          - "generator"
      - path: "packages/generator-rest-client/src/index.ts"
        must_exist: true
        must_contain:
          - "generatorHandler"
          - "onGenerate"
      - path: "packages/generator-rest-client/src/generator.ts"
        must_exist: true
        must_contain:
          - "dmmf"
          - "findMany"
          - "create"
    weight: 0.4

  - type: "build"
    command: "cd packages/generator-rest-client && npx tsc --noEmit"
    weight: 0.3

  - type: "regex"
    file: "packages/generator-rest-client/src/generator.ts"
    patterns:
      - pattern: "findUnique|findMany"
        should_match: true
      - pattern: "model|Model"
        should_match: true
      - pattern: "interface|type"
        should_match: true
    weight: 0.15

  - type: "regex"
    file: "packages/generator-rest-client/src/index.ts"
    patterns:
      - pattern: "generatorHandler"
        should_match: true
      - pattern: "onGenerate|onManifest"
        should_match: true
    weight: 0.15
