id: "feature-addition/add-prisma-generator"
name: "add REST API client generator"
version: 1

category: "feature-addition"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "prisma", "code-generation", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new Prisma generator package that generates a typed REST API client from
  a Prisma schema. For each model it should generate a TypeScript interface and
  CRUD methods (findMany, findUnique, create, update, delete) with proper types.
  The generator should implement the standard Prisma generator protocol and
  output the generated client. Follow the existing monorepo package structure.

setup:
  source_repo:
    url: "https://github.com/prisma/prisma.git"
    ref: "7.6.0"
  install_command: "pnpm install --no-frozen-lockfile"
  timeout_minutes: 30
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a new Prisma generator package that generates a typed REST
      API client from a Prisma schema, following the existing monorepo package structure.
      Check the diff for:
      - A new package directory under packages/ with a package.json referencing prisma
        and generator
      - An entry point file using generatorHandler with onGenerate (and optionally
        onManifest) callbacks from the Prisma generator protocol
      - A generator implementation that reads dmmf (Prisma's data model meta format)
        and iterates over models
      - For each model, generates a TypeScript interface and CRUD methods: findMany,
        findUnique, create, update, delete with proper types
      - The generated output is written to the generator output directory
      - Code follows TypeScript conventions and the standard Prisma generator patterns
    weight: 1.0
