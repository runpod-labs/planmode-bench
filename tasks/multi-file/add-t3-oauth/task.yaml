id: "multi-file/add-t3-oauth"
name: "Add GitHub OAuth Provider to T3 Stack App"
version: 1
category: "multi-file"
difficulty: "hard"
estimated_time_minutes: 20
tags: ["typescript", "nextjs", "trpc", "oauth", "t3-stack", "real-codebase"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add GitHub OAuth authentication to this T3 stack application (Next.js + tRPC + Prisma + NextAuth).

  Study the existing codebase to understand how authentication is set up, then add:

  1. Add GitHub as an OAuth provider in the NextAuth configuration
  2. Create the necessary environment variable types for GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET
  3. Add a GitHub sign-in button component
  4. Update the Prisma schema if needed to support the GitHub provider (Account model)
  5. Add a user profile page that shows the GitHub username and avatar
  6. Make sure the tRPC context properly passes the GitHub session data

  Follow the existing patterns in the codebase exactly.

setup:
  source_repo:
    url: "https://github.com/t3-oss/create-t3-app.git"
    ref: "v5.7.0"
  install_command: "pnpm install --no-frozen-lockfile"
  timeout_minutes: 25
  max_budget_usd: 5.00

evaluation:
  - type: "build"
    command: "grep -r 'github\\|GitHub' cli/template/ | wc -l | xargs test 0 -lt"
    weight: 0.4
  - type: "build"
    command: "grep -r 'GITHUB_CLIENT' cli/template/ | wc -l | xargs test 0 -lt"
    weight: 0.3
  - type: "build"
    command: "grep -r 'GithubProvider\\|GitHubProvider' cli/template/ | wc -l | xargs test 0 -lt"
    weight: 0.3
