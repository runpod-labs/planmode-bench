id: "multi-file/add-transformersjs-pipeline"
name: "add image-text-to-text pipeline"
version: 1

category: "multi-file"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "ml", "transformers", "pipeline", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new `image-text-to-text` pipeline to the Transformers.js library. It
  should accept an image and a text prompt, process both through the appropriate
  model (AutoModelForImageTextToText), and return generated text. Register it in
  the supported tasks mapping as a multimodal pipeline with proper JSDoc
  documentation. Follow the existing pipeline patterns.

  Do NOT modify any existing pipeline classes or their behavior.

setup:
  source_repo:
    url: "https://github.com/huggingface/transformers.js.git"
    ref: "3.8.1"
  install_command: "npm install"
  timeout_minutes: 30
  max_budget_usd: 25.00

evaluation:
  - type: "file-check"
    checks:
      - path: "src/pipelines.js"
        must_exist: true
        must_contain:
          - "ImageTextToTextPipeline"
          - "image-text-to-text"
          - "AutoModelForImageTextToText"
    weight: 0.3

  - type: "build"
    command: "node -e \"const p = require('./src/pipelines.js'); if (typeof p.ImageTextToTextPipeline !== 'function') { process.exit(1); } console.log('OK')\""
    expected_output: "OK"
    weight: 0.3

  - type: "regex"
    file: "src/pipelines.js"
    patterns:
      - pattern: "class ImageTextToTextPipeline"
        should_match: true
      - pattern: "async _call\\("
        should_match: true
      - pattern: "\"image-text-to-text\":\\s*\\{"
        should_match: true
      - pattern: "AutoModelForImageTextToText"
        should_match: true
      - pattern: "generate\\("
        should_match: true
      - pattern: "@typedef.*ImageTextToText"
        should_match: true
    weight: 0.2

  - type: "regex"
    file: "src/pipelines.js"
    patterns:
      - pattern: "\"type\":\\s*\"multimodal\""
        should_match: true
      - pattern: "generated_text"
        should_match: true
      - pattern: "pixel_values"
        should_match: true
    weight: 0.2
