id: "multi-file/add-transformersjs-pipeline"
name: "add image-text-to-text pipeline"
version: 1

category: "multi-file"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "ml", "transformers", "pipeline", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-04"

prompt: |
  Add a new `image-text-to-text` pipeline to the Transformers.js library. It
  should accept an image and a text prompt, process both through the appropriate
  model (AutoModelForImageTextToText), and return generated text. Register it in
  the supported tasks mapping as a multimodal pipeline with proper JSDoc
  documentation. Follow the existing pipeline patterns.

  Do NOT modify any existing pipeline classes or their behavior.

setup:
  source_repo:
    url: "https://github.com/huggingface/transformers.js.git"
    ref: "3.8.1"
  install_command: "npm install"
  timeout_minutes: 30
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add an image-text-to-text pipeline to the Transformers.js library.
      Check the diff for:
      - A new ImageTextToTextPipeline class with an async _call method
      - The pipeline accepts an image and a text prompt, processes both through the model
      - Uses AutoModelForImageTextToText for the model
      - Calls generate() to produce output text
      - Handles pixel_values for image processing and returns generated_text
      - Registered in the supported tasks mapping as "image-text-to-text" with type "multimodal"
      - Proper JSDoc documentation including @typedef for ImageTextToText
      - Follows the existing pipeline class patterns in the codebase
      - No existing pipeline classes or their behavior are modified
    weight: 1.0
