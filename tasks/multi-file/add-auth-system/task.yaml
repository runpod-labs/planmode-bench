id: "multi-file/add-auth-system"
name: "Add JWT Authentication System to REST API"
version: 1
category: "multi-file"
difficulty: "hard"
estimated_time_minutes: 25
tags: ["typescript", "express", "jwt", "authentication", "multi-file", "middleware"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  This Express API needs a JWT authentication system. Add the following:

  1. Create `src/routes/auth.ts` with POST /auth/register and POST /auth/login endpoints
  2. Create `src/middleware/auth.ts` with JWT verification middleware
  3. Register should hash passwords (use a simple hash, no bcrypt needed) and return a JWT token
  4. Login should verify credentials and return a JWT token
  5. Protect POST/PUT/DELETE on /posts and /comments with auth middleware (GET stays public)
  6. When creating a post/comment, use the authenticated user's ID from the token
  7. Only the owner of a post/comment can update or delete it (return 403 otherwise)
  8. Wire the auth routes into the app
  9. All existing tests should still pass, and the new auth tests should pass too

  Use "super-secret-key" as the JWT secret for simplicity.

setup:
  install_command: "npm install"
  timeout_minutes: 15
  max_budget_usd: 25.00

evaluation:
  - type: "test-suite"
    command: "npx vitest run"
    weight: 0.4
  - type: "test-integrity"
    weight: 0.1
  - type: "file-check"
    checks:
      - path: "src/routes/auth.ts"
        must_exist: true
        must_contain:
          - "register"
          - "login"
      - path: "src/middleware/auth.ts"
        must_exist: true
        must_contain:
          - "jwt"
    weight: 0.2
  - type: "build"
    command: "npx tsc --noEmit"
    weight: 0.2
  - type: "regex"
    file: "src/routes/posts.ts"
    patterns:
      - pattern: "import.*auth"
        should_match: true
    weight: 0.1
