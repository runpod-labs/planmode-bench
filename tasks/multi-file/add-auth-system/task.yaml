id: "multi-file/add-auth-system"
name: "add JWT authentication system"
version: 1
category: "multi-file"
difficulty: "hard"
estimated_time_minutes: 25
tags: ["typescript", "express", "jwt", "authentication", "multi-file", "middleware"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  Add JWT authentication to this Express API. Users should be able to register
  and log in, receiving a JWT token. Protect write operations (POST/PUT/DELETE)
  on posts and comments with auth middleware while keeping GET endpoints public.
  Only the owner of a post or comment should be able to update or delete it
  (return 403 otherwise). Use "super-secret-key" as the JWT secret. All tests
  should pass.

setup:
  install_command: "npm install"
  timeout_minutes: 15
  max_budget_usd: 25.00

evaluation:
  - type: "test-suite"
    command: "npx vitest run"
    weight: 0.4
  - type: "test-integrity"
    weight: 0.1
  - type: "file-check"
    checks:
      - path: "src/routes/auth.ts"
        must_exist: true
        must_contain:
          - "register"
          - "login"
      - path: "src/middleware/auth.ts"
        must_exist: true
        must_contain:
          - "jwt"
    weight: 0.2
  - type: "build"
    command: "npx tsc --noEmit"
    weight: 0.2
  - type: "regex"
    file: "src/routes/posts.ts"
    patterns:
      - pattern: "import.*auth"
        should_match: true
    weight: 0.1
