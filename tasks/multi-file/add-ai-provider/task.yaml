id: "multi-file/add-ai-provider"
name: "add new AI image provider"
version: 1

category: "multi-file"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "ai-sdk", "provider", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  Add a new fictional "PixelArt" AI provider to the Vercel AI SDK that only
  supports image generation (no text, no chat, no embeddings). It should export
  a `createPixelArt` factory function and support image settings for size, style
  ("pixel", "retro", "8bit"), and pixel density. Use "https://api.pixelart.ai/v1"
  as the base URL. Follow the same package structure as existing providers.

  Do NOT modify any existing provider packages. Only create new files.

setup:
  source_repo:
    url: "https://github.com/vercel/ai.git"
    ref: "ai@6.0.145"
  install_command: "pnpm install --no-frozen-lockfile"
  timeout_minutes: 30
  max_budget_usd: 25.00

evaluation:
  - type: "file-check"
    checks:
      - path: "packages/pixelart/package.json"
        must_exist: true
      - path: "packages/pixelart/src/index.ts"
        must_exist: true
        must_contain:
          - "createPixelArt"
      - path: "packages/pixelart/src/pixelart-provider.ts"
        must_exist: true
        must_contain:
          - "pixelart"
      - path: "packages/pixelart/src/pixelart-image-model.ts"
        must_exist: true
        must_contain:
          - "generateImage"
          - "pixelDensity"
    weight: 0.4

  - type: "build"
    command: "cd packages/pixelart && npx tsc --noEmit"
    weight: 0.3

  - type: "regex"
    file: "packages/pixelart/src/index.ts"
    patterns:
      - pattern: "export.*createPixelArt"
        should_match: true
      - pattern: "PixelArtProvider"
        should_match: true
    weight: 0.15

  - type: "regex"
    file: "packages/pixelart/src/pixelart-image-model.ts"
    patterns:
      - pattern: "pixel.*8bit|8bit.*pixel|style"
        should_match: true
      - pattern: "api\\.pixelart\\.ai"
        should_match: true
    weight: 0.15
