id: "multi-file/add-ai-provider"
name: "add new AI image provider"
version: 1

category: "multi-file"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "ai-sdk", "provider", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  Add a new fictional "PixelArt" AI provider to the Vercel AI SDK that only
  supports image generation (no text, no chat, no embeddings). It should export
  a `createPixelArt` factory function and support image settings for size, style
  ("pixel", "retro", "8bit"), and pixel density. Use "https://api.pixelart.ai/v1"
  as the base URL. Follow the same package structure as existing providers.

  Do NOT modify any existing provider packages. Only create new files.

setup:
  source_repo:
    url: "https://github.com/vercel/ai.git"
    ref: "ai@6.0.145"
  install_command: "pnpm install --no-frozen-lockfile"
  timeout_minutes: 30
  max_budget_usd: 40.00

evaluation:
  - type: "llm-judge"
    rubric: |
      The agent should add a fictional "PixelArt" AI provider to the Vercel AI SDK
      that only supports image generation (no text, chat, or embeddings).
      Check the diff for:
      - A new provider package under packages/ with a package.json
      - An exported createPixelArt factory function
      - A PixelArtProvider class or object that creates image models
      - An image model implementation with a generateImage method
      - Image settings supporting size, style ("pixel", "retro", "8bit"), and pixel density
      - Base URL set to "https://api.pixelart.ai/v1"
      - The package follows the same structure as existing AI SDK providers
      - No existing provider packages are modified; only new files are created
    weight: 1.0
