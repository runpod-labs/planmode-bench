id: "multi-file/add-ai-provider"
name: "Add New AI Image Provider to Vercel AI SDK"
version: 1

category: "multi-file"
difficulty: "expert"
estimated_time_minutes: 30
tags: ["typescript", "ai-sdk", "provider", "real-codebase", "large-repo"]
author: "runpod-labs"
created_at: "2026-04-03"

prompt: |
  Add a new fictional "PixelArt" AI provider to the Vercel AI SDK. This provider
  ONLY supports image generation (no text, no chat, no embeddings).

  Study how existing providers are implemented (look at packages/openai, packages/google,
  or similar providers in the codebase). Then create a new provider following the same patterns.

  Requirements:
  1. Create a new package at `packages/pixelart/` following the same structure as other providers
  2. The provider should export a `createPixelArt` factory function
  3. It should only implement image generation (the `generateImage` method)
  4. The image model should support these settings: size (string), style ("pixel" | "retro" | "8bit"), pixelDensity (number)
  5. Create a proper package.json, tsconfig.json, and src/index.ts
  6. Create src/pixelart-provider.ts with the provider class
  7. Create src/pixelart-image-model.ts with the image model
  8. The provider should use "https://api.pixelart.ai/v1" as the base URL
  9. Export types for PixelArtProvider, PixelArtImageModelId, and PixelArtImageSettings
  10. Make sure the package compiles with TypeScript

  Do NOT modify any existing provider packages. Only create new files in packages/pixelart/.

setup:
  source_repo:
    url: "https://github.com/vercel/ai.git"
    ref: "ai@6.0.145"
  install_command: "pnpm install --no-frozen-lockfile"
  timeout_minutes: 30
  max_budget_usd: 25.00

evaluation:
  - type: "file-check"
    checks:
      - path: "packages/pixelart/package.json"
        must_exist: true
      - path: "packages/pixelart/src/index.ts"
        must_exist: true
        must_contain:
          - "createPixelArt"
      - path: "packages/pixelart/src/pixelart-provider.ts"
        must_exist: true
        must_contain:
          - "pixelart"
      - path: "packages/pixelart/src/pixelart-image-model.ts"
        must_exist: true
        must_contain:
          - "generateImage"
          - "pixelDensity"
    weight: 0.4

  - type: "build"
    command: "cd packages/pixelart && npx tsc --noEmit"
    weight: 0.3

  - type: "regex"
    file: "packages/pixelart/src/index.ts"
    patterns:
      - pattern: "export.*createPixelArt"
        should_match: true
      - pattern: "PixelArtProvider"
        should_match: true
    weight: 0.15

  - type: "regex"
    file: "packages/pixelart/src/pixelart-image-model.ts"
    patterns:
      - pattern: "pixel.*8bit|8bit.*pixel|style"
        should_match: true
      - pattern: "api\\.pixelart\\.ai"
        should_match: true
    weight: 0.15
